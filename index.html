<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MIDI City Generator</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; font-family: 'Courier New', monospace; color: #e0e0e0; }
  canvas { display: block; }
  #ui { position: fixed; top: 20px; left: 20px; z-index: 10; pointer-events: none; }
  #status {
    background: rgba(0,0,0,0.7); padding: 10px 16px; border-radius: 8px;
    font-size: 13px; border: 1px solid rgba(100,255,150,0.3); backdrop-filter: blur(10px);
  }
  #chord-display {
    margin-top: 10px; background: rgba(0,0,0,0.7); padding: 10px 16px;
    border-radius: 8px; font-size: 20px; border: 1px solid rgba(255,255,255,0.1);
    backdrop-filter: blur(10px); opacity: 0; transition: opacity 0.3s;
  }
  #chord-display.visible { opacity: 1; }
  #info {
    position: fixed; top: 20px; right: 20px; background: rgba(0,0,0,0.7);
    padding: 10px 16px; border-radius: 8px; font-size: 13px;
    border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px); z-index: 10;
    text-align: right; line-height: 1.6;
  }
  #piano {
    position: fixed; bottom: 60px; left: 50%; transform: translateX(-50%);
    display: flex; z-index: 10; pointer-events: none;
  }
  .pw { position: relative; width: 32px; height: 90px; }
  .pk {
    position: absolute; bottom: 0; border-radius: 0 0 3px 3px;
    display: flex; align-items: flex-end; justify-content: center;
    padding-bottom: 5px; font-size: 9px; font-family: 'Courier New', monospace;
    transition: background 0.08s;
  }
  .pk.w {
    width: 30px; height: 90px; background: rgba(220,220,230,0.12);
    border: 1px solid rgba(255,255,255,0.08); color: rgba(255,255,255,0.3); z-index: 1;
  }
  .pk.b {
    width: 22px; height: 55px; background: rgba(30,30,50,0.7);
    border: 1px solid rgba(255,255,255,0.06); color: rgba(255,255,255,0.25);
    z-index: 2; right: -11px; top: 0;
  }
  .pk.active { background: rgba(126,184,255,0.5); box-shadow: 0 0 12px rgba(126,184,255,0.4); color: #fff; }
  .pk.b.active { background: rgba(126,184,255,0.6); }
  #help {
    position: fixed; bottom: 14px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,0.6); padding: 8px 16px; border-radius: 8px;
    font-size: 11px; border: 1px solid rgba(255,255,255,0.08);
    backdrop-filter: blur(10px); z-index: 10; color: #555; text-align: center;
    white-space: nowrap;
  }
  .dim { color: #555; }
  .algo-dla { color: #66ddee; }
  .algo-eden { color: #66ee88; }
  .algo-sprawl { color: #eebb66; }
</style>
</head>
<body>
<div id="ui">
  <div id="status">Keyboard ready. MIDI: scanning...</div>
  <div id="chord-display"></div>
</div>
<div id="info">
  <span class="dim">Buildings:</span> <span id="count">0</span><br>
  <span class="dim">Algorithm:</span> <span id="algo-name">—</span>
</div>
<div id="piano"></div>
<div id="help">Hold 3+ keys for a chord &nbsp;|&nbsp; A S D F G H J = white &nbsp;|&nbsp; W E T Y U = black &nbsp;|&nbsp; Esc = reset</div>

<script type="importmap">
{ "imports": {
    "three": "https://unpkg.com/three@0.162.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.162.0/examples/jsm/"
} }
</script>

<script type="module">
import * as THREE from 'three';

// ===================== CONSTANTS =====================
const NOTE_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];

const KEY_TO_NOTE = {
  'a':60,'w':61,'s':62,'e':63,'d':64,'f':65,'t':66,
  'g':67,'y':68,'h':69,'u':70,'j':71,'k':72,'o':73,
  'l':74,'p':75,';':76,"'":77,']':78,
};

const PIANO_LAYOUT = [
  {n:60,k:'A',b:false},{n:61,k:'W',b:true},{n:62,k:'S',b:false},{n:63,k:'E',b:true},
  {n:64,k:'D',b:false},{n:65,k:'F',b:false},{n:66,k:'T',b:true},{n:67,k:'G',b:false},
  {n:68,k:'Y',b:true},{n:69,k:'H',b:false},{n:70,k:'U',b:true},{n:71,k:'J',b:false},
  {n:72,k:'K',b:false},{n:73,k:'O',b:true},{n:74,k:'L',b:false},{n:75,k:'P',b:true},
  {n:76,k:';',b:false},{n:77,k:"'",b:false},{n:78,k:']',b:true},
];

const CHORD_MAP = {
  '0,3,7':'min','0,4,7':'maj','0,3,6':'dim','0,4,8':'aug',
  '0,3,7,10':'min7','0,4,7,10':'dom7','0,4,7,11':'maj7',
  '0,3,6,9':'dim7','0,3,7,11':'minMaj7','0,2,7':'sus2',
  '0,5,7':'sus4','0,4,7,10,14':'dom9','0,4,7,11,14':'maj9',
  '0,3,7,10,14':'min9','0,7':'power','0,4,7,14':'add9','0,3,7,14':'minadd9',
};

const STYLES = {
  maj:  {hue:0.56,sat:0.50,lit:0.35,litP:0.75,met:0.6,rough:0.2},
  min:  {hue:0.76,sat:0.40,lit:0.22,litP:0.35,met:0.2,rough:0.85},
  dim:  {hue:0.04,sat:0.50,lit:0.22,litP:0.45,met:0.1,rough:0.9},
  aug:  {hue:0.42,sat:0.50,lit:0.30,litP:0.60,met:0.4,rough:0.4},
  dom7: {hue:0.10,sat:0.60,lit:0.33,litP:0.70,met:0.3,rough:0.4},
  min7: {hue:0.72,sat:0.30,lit:0.20,litP:0.30,met:0.1,rough:0.9},
  maj7: {hue:0.54,sat:0.30,lit:0.40,litP:0.85,met:0.7,rough:0.1},
  dim7: {hue:0.06,sat:0.50,lit:0.20,litP:0.50,met:0.1,rough:0.9},
  sus2: {hue:0.50,sat:0.15,lit:0.40,litP:0.25,met:0.8,rough:0.2},
  sus4: {hue:0.08,sat:0.25,lit:0.32,litP:0.30,met:0.2,rough:0.8},
  power:{hue:0.00,sat:0.05,lit:0.30,litP:0.25,met:0.0,rough:1.0},
  chord:{hue:0.50,sat:0.30,lit:0.30,litP:0.50,met:0.2,rough:0.7},
  minMaj7:{hue:0.74,sat:0.35,lit:0.25,litP:0.40,met:0.15,rough:0.85},
  minadd9:{hue:0.73,sat:0.35,lit:0.24,litP:0.38,met:0.15,rough:0.8},
  add9: {hue:0.45,sat:0.45,lit:0.32,litP:0.65,met:0.35,rough:0.45},
  min9: {hue:0.75,sat:0.38,lit:0.23,litP:0.38,met:0.18,rough:0.82},
  dom9: {hue:0.11,sat:0.55,lit:0.32,litP:0.68,met:0.28,rough:0.45},
  maj9: {hue:0.55,sat:0.32,lit:0.38,litP:0.80,met:0.65,rough:0.15},
};

// ===================== DOM =====================
const statusEl = document.getElementById('status');
const chordEl = document.getElementById('chord-display');
const countEl = document.getElementById('count');
const algoEl = document.getElementById('algo-name');
const pianoEl = document.getElementById('piano');

// ===================== THREE.JS SCENE =====================
let W = window.innerWidth, H = window.innerHeight;

const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
renderer.setSize(W, H);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.3;
document.body.prepend(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a28);
scene.fog = new THREE.Fog(0x0a0a28, 150, 600);

// Fixed overhead camera — never moves
const camera = new THREE.PerspectiveCamera(40, W / H, 0.1, 1200);
camera.position.set(0, 280, 200);
camera.lookAt(0, 0, 0);

// --- Lights (brighter, no per-building PointLights) ---
scene.add(new THREE.AmbientLight(0x2a2a55, 1.8));
scene.add(new THREE.HemisphereLight(0x223355, 0x111118, 1.0));

const moonDir = new THREE.DirectionalLight(0x8899cc, 0.8);
moonDir.position.set(60, 80, -40);
scene.add(moonDir);

const fillLight = new THREE.DirectionalLight(0x443355, 0.4);
fillLight.position.set(-40, 60, 30);
scene.add(fillLight);

// Moon
const moonMesh = new THREE.Mesh(
  new THREE.SphereGeometry(4, 32, 32),
  new THREE.MeshBasicMaterial({ color: 0xfffff0 })
);
moonMesh.position.set(80, 90, -150);
scene.add(moonMesh);

// Stars
const starCount = 800;
const starPos = new Float32Array(starCount * 3);
for (let i = 0; i < starCount; i++) {
  starPos[i*3] = (Math.random()-0.5)*500;
  starPos[i*3+1] = Math.random()*140+30;
  starPos[i*3+2] = (Math.random()-0.5)*500;
}
const starGeo = new THREE.BufferGeometry();
starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({
  color: 0xffffff, size: 0.4, transparent: true, opacity: 0.7
})));

// Ground
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(800, 800),
  new THREE.MeshStandardMaterial({ color: 0x0e0e1e, roughness: 0.92, metalness: 0.05 })
);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -0.02;
scene.add(ground);

window.addEventListener('resize', () => {
  W = window.innerWidth; H = window.innerHeight;
  camera.aspect = W / H;
  camera.updateProjectionMatrix();
  renderer.setSize(W, H);
});

// ===================== GRID STATE =====================
const GRID_SIZE = 80;
const CELL_SIZE = 9;
const HALF_GRID = Math.floor(GRID_SIZE / 2);
const DIRS = [[0,1],[0,-1],[1,0],[-1,0]];
const grid = new Set();
const buildings = [];
const spawning = [];

function gridToWorld(gx, gz) {
  return { x: (gx - HALF_GRID) * CELL_SIZE, z: (gz - HALF_GRID) * CELL_SIZE };
}
function inBounds(x, z) { return x >= 0 && x < GRID_SIZE && z >= 0 && z < GRID_SIZE; }
function key(x, z) { return `${x},${z}`; }

// ===================== ROADS (InstancedMesh — 1 draw call) =====================
const ROAD_MAX = 3000;
const roadGeo = new THREE.PlaneGeometry(CELL_SIZE * 0.92, CELL_SIZE * 0.92);
roadGeo.rotateX(-Math.PI / 2);
const roadMat = new THREE.MeshStandardMaterial({
  color: 0x1c1c32, roughness: 0.75, metalness: 0.1,
  emissive: 0x0c0c18, emissiveIntensity: 0.3,
});
const roadMesh = new THREE.InstancedMesh(roadGeo, roadMat, ROAD_MAX);
roadMesh.count = 0;
roadMesh.position.y = 0.01;
scene.add(roadMesh);

const roadCells = new Set();
let roadCount = 0;
const dummy = new THREE.Object3D();

// ===================== STREETLAMPS (InstancedMesh — 2 draw calls) =====================
const LAMP_MAX = 800;
const poleGeo = new THREE.CylinderGeometry(0.08, 0.1, 3.5, 5);
const poleMesh = new THREE.InstancedMesh(poleGeo,
  new THREE.MeshStandardMaterial({ color: 0x445566, roughness: 0.5, metalness: 0.5 }), LAMP_MAX);
poleMesh.count = 0;
scene.add(poleMesh);

const headGeo = new THREE.SphereGeometry(0.22, 6, 6);
const headMesh = new THREE.InstancedMesh(headGeo,
  new THREE.MeshBasicMaterial({ color: 0xffeeaa }), LAMP_MAX);
headMesh.count = 0;
scene.add(headMesh);

let lampCount = 0;

function addStreetlamp(wx, wz) {
  if (lampCount >= LAMP_MAX) return;
  const offX = (Math.random() - 0.5) * CELL_SIZE * 0.6;
  const offZ = (Math.random() - 0.5) * CELL_SIZE * 0.6;
  dummy.position.set(wx + offX, 1.75, wz + offZ);
  dummy.updateMatrix();
  poleMesh.setMatrixAt(lampCount, dummy.matrix);
  dummy.position.y = 3.6;
  dummy.updateMatrix();
  headMesh.setMatrixAt(lampCount, dummy.matrix);
  lampCount++;
  poleMesh.count = lampCount;
  headMesh.count = lampCount;
  poleMesh.instanceMatrix.needsUpdate = true;
  headMesh.instanceMatrix.needsUpdate = true;
}

function addRoad(gx, gz) {
  if (!inBounds(gx, gz) || grid.has(key(gx, gz)) || roadCells.has(key(gx, gz))) return false;
  if (roadCount >= ROAD_MAX) return false;
  roadCells.add(key(gx, gz));
  const w = gridToWorld(gx, gz);
  dummy.position.set(w.x, 0, w.z);
  dummy.updateMatrix();
  roadMesh.setMatrixAt(roadCount, dummy.matrix);
  roadCount++;
  roadMesh.count = roadCount;
  roadMesh.instanceMatrix.needsUpdate = true;
  // Streetlamp every 3rd road tile
  if (roadCount % 3 === 0) addStreetlamp(w.x, w.z);
  return true;
}

// --- Road generation: connect buildings ---
function generateRoadsForBuilding(gx, gz, rng) {
  // Scan each cardinal direction for a nearby building, lay road between
  for (const [dx, dz] of DIRS) {
    for (let dist = 1; dist <= 8; dist++) {
      const nx = gx + dx * dist, nz = gz + dz * dist;
      if (!inBounds(nx, nz)) break;
      if (grid.has(key(nx, nz))) {
        // Found a building — fill road cells between
        for (let d = 1; d < dist; d++) addRoad(gx + dx * d, gz + dz * d);
        break;
      }
    }
  }
  // 40% chance: random tendril 1-3 cells
  if (rng() < 0.4) {
    const [dx, dz] = DIRS[Math.floor(rng() * 4)];
    const len = 1 + Math.floor(rng() * 3);
    for (let d = 1; d <= len; d++) addRoad(gx + dx * d, gz + dz * d);
  }
}

// --- Periodic road growth (every 1.5s) ---
let roadInterval = null;
function startRoadGrowth() {
  if (roadInterval) return;
  roadInterval = setInterval(() => {
    if (buildings.length === 0 || roadCount >= ROAD_MAX) return;
    // Pick random road or building cell as start
    const pool = [...roadCells, ...grid];
    if (pool.length === 0) return;
    const start = pool[Math.floor(Math.random() * pool.length)];
    const [sx, sz] = start.split(',').map(Number);
    let cx = sx, cz = sz;
    let [dx, dz] = DIRS[Math.floor(Math.random() * 4)];
    const len = 1 + Math.floor(Math.random() * 4);
    for (let i = 0; i < len; i++) {
      cx += dx; cz += dz;
      if (!addRoad(cx, cz)) break;
      // 20% chance to turn
      if (Math.random() < 0.2) [dx, dz] = DIRS[Math.floor(Math.random() * 4)];
    }
  }, 1500);
}

// ===================== PLACEMENT ALGORITHMS =====================
function placeDLA(rng) {
  const edges = [];
  for (let i = 0; i < GRID_SIZE; i++) {
    if (!grid.has(key(0,i))) edges.push([0,i]);
    if (!grid.has(key(GRID_SIZE-1,i))) edges.push([GRID_SIZE-1,i]);
    if (!grid.has(key(i,0))) edges.push([i,0]);
    if (!grid.has(key(i,GRID_SIZE-1))) edges.push([i,GRID_SIZE-1]);
  }
  if (edges.length === 0) return placeEden(rng);
  let [px, pz] = edges[Math.floor(rng() * edges.length)];
  for (let step = 0; step < 3000; step++) {
    const [dx, dz] = DIRS[Math.floor(rng() * 4)];
    const nx = px + dx, nz = pz + dz;
    if (!inBounds(nx, nz)) continue;
    if (grid.has(key(nx, nz))) {
      grid.add(key(px, pz));
      return { gx: px, gz: pz, algo: 'DLA' };
    }
    px = nx; pz = nz;
  }
  return placeEden(rng);
}

function placeEden(rng) {
  const seen = new Set();
  const frontier = [];
  for (const k of grid) {
    const [x, z] = k.split(',').map(Number);
    for (const [dx, dz] of DIRS) {
      const nx = x + dx, nz = z + dz, nk = key(nx, nz);
      if (inBounds(nx, nz) && !grid.has(nk) && !seen.has(nk)) {
        seen.add(nk);
        frontier.push({ gx: nx, gz: nz });
      }
    }
  }
  if (frontier.length === 0) return null;
  const pick = frontier[Math.floor(rng() * frontier.length)];
  grid.add(key(pick.gx, pick.gz));
  return { ...pick, algo: 'Eden' };
}

function placeSprawl(rng) {
  const fm = new Map();
  for (const k of grid) {
    const [x, z] = k.split(',').map(Number);
    for (const [dx, dz] of DIRS) {
      const nx = x + dx, nz = z + dz, nk = key(nx, nz);
      if (inBounds(nx, nz) && !grid.has(nk)) fm.set(nk, (fm.get(nk) || 0) + 1);
    }
  }
  if (fm.size === 0) return null;
  const entries = [...fm.entries()];
  const weights = entries.map(([, c]) => c * c);
  const total = weights.reduce((a, b) => a + b, 0);
  let r = rng() * total;
  for (let i = 0; i < entries.length; i++) {
    r -= weights[i];
    if (r <= 0) {
      const [gx, gz] = entries[i][0].split(',').map(Number);
      grid.add(key(gx, gz));
      return { gx, gz, algo: 'Sprawl' };
    }
  }
  const [gx, gz] = entries[entries.length-1][0].split(',').map(Number);
  grid.add(key(gx, gz));
  return { gx, gz, algo: 'Sprawl' };
}

function findPlacement(rng) {
  if (grid.size === 0) {
    grid.add(key(HALF_GRID, HALF_GRID));
    return { gx: HALF_GRID, gz: HALF_GRID, algo: 'Seed' };
  }
  const roll = rng();
  if (roll < 0.33) return placeDLA(rng);
  if (roll < 0.66) return placeEden(rng);
  return placeSprawl(rng);
}

// ===================== SEEDED RNG =====================
const seededRandom = (seed) => {
  let s = Math.abs(seed) || 1;
  return () => { s = (s * 16807) % 2147483647; return (s - 1) / 2147483646; };
};

// ===================== TEXTURES & MATERIALS =====================
function makeWindowTex(floors, cols, bodyHex, litProb, rng) {
  const sz = 256, c = document.createElement('canvas');
  c.width = sz; c.height = sz;
  const ctx = c.getContext('2d');
  ctx.fillStyle = bodyHex;
  ctx.fillRect(0, 0, sz, sz);
  const cw = sz / cols, ch = sz / floors;
  for (let r = 0; r < floors; r++) {
    for (let ci = 0; ci < cols; ci++) {
      const wx = ci*cw + cw*0.18, wy = r*ch + ch*0.12;
      if (rng() < litProb) {
        const t = rng();
        ctx.fillStyle = t > 0.6 ? '#ffdd88' : t > 0.3 ? '#ffeebb' : '#aaccee';
      } else {
        ctx.fillStyle = '#08080f';
      }
      ctx.fillRect(wx, wy, cw*0.64, ch*0.76);
    }
  }
  return new THREE.CanvasTexture(c);
}

function buildingMat(tex, style) {
  return new THREE.MeshStandardMaterial({
    map: tex, emissiveMap: tex,
    emissive: new THREE.Color(0xffffff),
    emissiveIntensity: 1.1,
    roughness: style.rough, metalness: style.met,
  });
}

function solidMat(color, rough = 0.7, met = 0.2) {
  return new THREE.MeshStandardMaterial({ color, roughness: rough, metalness: met });
}

function colorFromStyle(root, style) {
  return new THREE.Color().setHSL((style.hue + root/12*0.12) % 1, style.sat, style.lit);
}

function colorToHex(c) {
  return `rgb(${Math.floor(c.r*255)},${Math.floor(c.g*255)},${Math.floor(c.b*255)})`;
}

// ===================== BUILDING GENERATORS =====================
function buildSkyscraper(p) {
  const g = new THREE.Group();
  const tex = makeWindowTex(Math.round(p.h/4), Math.max(2,Math.round(p.w/3.5)), colorToHex(p.color.clone().multiplyScalar(0.5)), p.style.litP, p.rng);
  g.add(Object.assign(new THREE.Mesh(new THREE.BoxGeometry(p.w, p.h, p.d), buildingMat(tex, p.style)), { position: new THREE.Vector3(0, p.h/2, 0) }));
  g.add(Object.assign(new THREE.Mesh(new THREE.BoxGeometry(p.w*0.7, 0.3, p.d*0.7), solidMat(0x445566, 0.5, 0.5)), { position: new THREE.Vector3(0, p.h+0.15, 0) }));
  return g;
}

function buildGothic(p) {
  const g = new THREE.Group();
  const w = p.w * 0.75;
  const tex = makeWindowTex(Math.round(p.h/5), Math.max(2,Math.round(w/4)), colorToHex(p.color.clone().multiplyScalar(0.4)), p.style.litP, p.rng);
  const body = new THREE.Mesh(new THREE.BoxGeometry(w, p.h, p.d*0.8), buildingMat(tex, p.style));
  body.position.y = p.h/2; g.add(body);
  const sH = p.h * 0.4;
  const spire = new THREE.Mesh(new THREE.ConeGeometry(w*0.35, sH, 4), solidMat(p.color.clone().multiplyScalar(0.6), 0.9, 0.1));
  spire.position.y = p.h + sH/2; spire.rotation.y = Math.PI/4; g.add(spire);
  return g;
}

function buildIndustrial(p) {
  const g = new THREE.Group();
  const bh = p.h * 0.6;
  const tex = makeWindowTex(Math.round(bh/5), Math.max(2,Math.round(p.w/3)), colorToHex(p.color.clone().multiplyScalar(0.45)), p.style.litP, p.rng);
  const body = new THREE.Mesh(new THREE.BoxGeometry(p.w*1.1, bh, p.d*1.05), buildingMat(tex, p.style));
  body.position.y = bh/2; g.add(body);
  for (let i = 0; i < 2 + Math.floor(p.rng()*2); i++) {
    const ch = p.h*(0.3+p.rng()*0.3), cr = 0.5+p.rng()*0.4;
    const c = new THREE.Mesh(new THREE.CylinderGeometry(cr, cr*1.1, ch, 6), solidMat(p.color.clone().multiplyScalar(0.5), 0.95, 0.05));
    c.position.set((p.rng()-0.5)*p.w*0.6, bh+ch/2, (p.rng()-0.5)*p.d*0.5); g.add(c);
  }
  return g;
}

function buildDome(p) {
  const g = new THREE.Group();
  const bH = p.h*0.65, rad = Math.min(p.w,p.d)*0.48;
  const tex = makeWindowTex(Math.round(bH/4.5), Math.max(2,Math.round(rad*2/4)), colorToHex(p.color.clone().multiplyScalar(0.5)), p.style.litP, p.rng);
  const base = new THREE.Mesh(new THREE.CylinderGeometry(rad, rad*1.05, bH, 16), buildingMat(tex, p.style));
  base.position.y = bH/2; g.add(base);
  const dome = new THREE.Mesh(new THREE.SphereGeometry(rad, 16, 10, 0, Math.PI*2, 0, Math.PI/2), solidMat(p.color.clone().multiplyScalar(0.8), 0.3, 0.6));
  dome.position.y = bH; g.add(dome);
  return g;
}

function buildArtDeco(p) {
  const g = new THREE.Group();
  let y = 0, tw = p.w, td = p.d;
  for (let i = 0; i < 3; i++) {
    const th = p.h/3*(1+(3-i)*0.15);
    const tex = makeWindowTex(Math.round(th/4.5), Math.max(2,Math.round(tw/3.5)), colorToHex(p.color.clone().multiplyScalar(0.45)), p.style.litP, p.rng);
    const tier = new THREE.Mesh(new THREE.BoxGeometry(tw, th, td), buildingMat(tex, p.style));
    tier.position.y = y + th/2; g.add(tier);
    y += th; tw *= 0.72; td *= 0.72;
  }
  const ant = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.3, p.h*0.15, 5), solidMat(0xccaa55, 0.3, 0.8));
  ant.position.y = y + p.h*0.075; g.add(ant);
  return g;
}

function buildCathedral(p) {
  const g = new THREE.Group();
  const tex = makeWindowTex(Math.round(p.h/5.5), Math.max(2,Math.round(p.w/4.5)), colorToHex(p.color.clone().multiplyScalar(0.35)), p.style.litP, p.rng);
  const body = new THREE.Mesh(new THREE.BoxGeometry(p.w, p.h, p.d), buildingMat(tex, p.style));
  body.position.y = p.h/2; g.add(body);
  const sH = p.h*0.6;
  const spire = new THREE.Mesh(new THREE.ConeGeometry(p.w*0.16, sH, 4), solidMat(p.color.clone().multiplyScalar(0.45), 0.9, 0.05));
  spire.position.y = p.h + sH/2; spire.rotation.y = Math.PI/4; g.add(spire);
  for (const s of [-1,1]) {
    const tH = p.h*0.3;
    const tw = new THREE.Mesh(new THREE.BoxGeometry(p.w*0.2, tH, p.d*0.2), solidMat(p.color.clone().multiplyScalar(0.5), 0.85, 0.08));
    tw.position.set(s*p.w*0.42, p.h+tH/2, 0); g.add(tw);
    const ms = new THREE.Mesh(new THREE.ConeGeometry(p.w*0.09, tH*0.5, 4), solidMat(p.color.clone().multiplyScalar(0.45), 0.9, 0.05));
    ms.position.set(s*p.w*0.42, p.h+tH+tH*0.25, 0); ms.rotation.y = Math.PI/4; g.add(ms);
  }
  return g;
}

function buildCrystal(p) {
  const g = new THREE.Group();
  const rad = Math.min(p.w,p.d)*0.4;
  const tex = makeWindowTex(Math.round(p.h/3.5), 8, colorToHex(p.color.clone().multiplyScalar(0.55)), p.style.litP, p.rng);
  const mat = buildingMat(tex, p.style); mat.transparent = true; mat.opacity = 0.88;
  const body = new THREE.Mesh(new THREE.CylinderGeometry(rad, rad*1.02, p.h, 8), mat);
  body.position.y = p.h/2; g.add(body);
  const ring = new THREE.Mesh(new THREE.TorusGeometry(rad*0.9, 0.2, 6, 8), new THREE.MeshBasicMaterial({ color: 0x88ccff }));
  ring.position.y = p.h; ring.rotation.x = Math.PI/2; g.add(ring);
  return g;
}

function buildFactory(p) {
  const g = new THREE.Group();
  const bh = p.h*0.55, bw = p.w*1.15;
  const tex = makeWindowTex(Math.round(bh/5), Math.max(2,Math.round(bw/3)), colorToHex(p.color.clone().multiplyScalar(0.4)), p.style.litP, p.rng);
  const body = new THREE.Mesh(new THREE.BoxGeometry(bw, bh, p.d*1.05), buildingMat(tex, p.style));
  body.position.y = bh/2; g.add(body);
  const teeth = 3 + Math.floor(p.rng()*2);
  const segW = bw / teeth;
  for (let i = 0; i < teeth; i++) {
    const rH = p.h*0.15 + p.rng()*p.h*0.08;
    const roof = new THREE.Mesh(new THREE.CylinderGeometry(segW*0.4, segW*0.4, p.d*1.05, 3), solidMat(p.color.clone().multiplyScalar(0.55), 0.85, 0.1));
    roof.rotation.set(Math.PI/2, 0, Math.PI/6);
    roof.position.set(-bw/2 + segW*(i+0.5), bh + rH*0.35, 0);
    roof.scale.x = rH/(segW*0.4); g.add(roof);
  }
  return g;
}

function buildWaterTower(p) {
  const g = new THREE.Group();
  const legH = p.h*0.6, tankH = p.h*0.35, legR = 0.3, tankR = Math.min(p.w,p.d)*0.35;
  for (let lx=-1;lx<=1;lx+=2) for (let lz=-1;lz<=1;lz+=2) {
    const leg = new THREE.Mesh(new THREE.CylinderGeometry(legR, legR, legH, 5), solidMat(0x667788, 0.5, 0.6));
    leg.position.set(lx*tankR*0.55, legH/2, lz*tankR*0.55); g.add(leg);
  }
  const tank = new THREE.Mesh(new THREE.CylinderGeometry(tankR, tankR*0.9, tankH, 12), solidMat(p.color, p.style.rough, p.style.met));
  tank.position.y = legH + tankH/2; g.add(tank);
  const cap = new THREE.Mesh(new THREE.ConeGeometry(tankR*0.85, tankH*0.4, 12), solidMat(p.color.clone().multiplyScalar(0.8), 0.6, 0.4));
  cap.position.y = legH + tankH + tankH*0.2; g.add(cap);
  return g;
}

function buildArch(p) {
  const g = new THREE.Group();
  const pH = p.h*0.85, pW = p.w*0.22, gap = p.w*0.5;
  const am = solidMat(p.color, p.style.rough, p.style.met);
  for (const s of [-1,1]) {
    const pillar = new THREE.Mesh(new THREE.BoxGeometry(pW, pH, p.d*0.6), am);
    pillar.position.set(s*gap/2, pH/2, 0); g.add(pillar);
  }
  const arch = new THREE.Mesh(new THREE.TorusGeometry(gap/2, pW*0.4, 6, 12, Math.PI), am);
  arch.position.y = pH; g.add(arch);
  const lintel = new THREE.Mesh(new THREE.BoxGeometry(gap+pW, pW*0.5, p.d*0.6), am);
  lintel.position.y = pH + gap/2 + pW*0.15; g.add(lintel);
  return g;
}

function buildBrutalist(p) {
  const g = new THREE.Group();
  for (let i = 0; i < 2+Math.floor(p.rng()*2); i++) {
    const bw = p.w*(0.5+p.rng()*0.5), bh = p.h*(0.4+p.rng()*0.5), bd = p.d*(0.5+p.rng()*0.5);
    const tex = makeWindowTex(Math.max(2,Math.round(bh/6)), Math.max(2,Math.round(bw/5)),
      colorToHex(p.color.clone().multiplyScalar(0.4+p.rng()*0.15)), p.style.litP, p.rng);
    const block = new THREE.Mesh(new THREE.BoxGeometry(bw, bh, bd), buildingMat(tex, p.style));
    block.position.set((p.rng()-0.5)*p.w*0.25, bh/2, (p.rng()-0.5)*p.d*0.25); g.add(block);
  }
  return g;
}

function buildGeneric(p) {
  const g = new THREE.Group();
  const tex = makeWindowTex(Math.round(p.h/4.5), Math.max(2,Math.round(p.w/3.5)), colorToHex(p.color.clone().multiplyScalar(0.45)), p.style.litP, p.rng);
  const body = new THREE.Mesh(new THREE.BoxGeometry(p.w, p.h, p.d), buildingMat(tex, p.style));
  body.position.y = p.h/2; g.add(body);
  return g;
}

const GENERATORS = {
  maj:buildSkyscraper, min:buildGothic, dim:buildIndustrial, aug:buildDome,
  dom7:buildArtDeco, min7:buildCathedral, maj7:buildCrystal, dim7:buildFactory,
  sus2:buildWaterTower, sus4:buildArch, power:buildBrutalist,
  chord:buildGeneric, minMaj7:buildGothic, minadd9:buildGothic,
  add9:buildDome, min9:buildCathedral, dom9:buildArtDeco, maj9:buildCrystal,
};

// ===================== ADD BUILDING =====================
function addBuilding(chord, velocity) {
  const seed = chord.notes.reduce((a, b) => a * 31 + b, 7) + Date.now();
  const rng = seededRandom(seed);
  const style = STYLES[chord.type] || STYLES.chord;
  const color = colorFromStyle(chord.root, style);
  const placement = findPlacement(rng);
  if (!placement) return;
  const { gx, gz, algo } = placement;
  const world = gridToWorld(gx, gz);
  const maxFoot = CELL_SIZE * 0.85;
  const h = 12 + (velocity/127)*40 + rng()*12;
  const w = Math.min(maxFoot, 5 + chord.notes.length*1.2 + rng()*3);
  const d = Math.min(maxFoot, 5 + rng()*3);
  const gen = GENERATORS[chord.type] || buildGeneric;
  const group = gen({ h, w, d, color, style, rng });
  group.position.set(world.x, 0, world.z);
  group.rotation.y = rng() * Math.PI * 2;
  group.scale.y = 0.01;
  scene.add(group);
  spawning.push({ group, progress: 0 });
  buildings.push(group);

  // Generate connecting roads
  generateRoadsForBuilding(gx, gz, rng);
  startRoadGrowth();

  countEl.textContent = buildings.length;
  const algoClass = algo === 'DLA' ? 'algo-dla' : algo === 'Eden' ? 'algo-eden' : algo === 'Sprawl' ? 'algo-sprawl' : 'dim';
  algoEl.className = algoClass;
  algoEl.textContent = algo;
}

// ===================== INPUT =====================
const heldNotes = new Map();
let chordTimeout = null;
const kbHeldKeys = new Set();
const pianoKeyEls = new Map();

function detectChord(notes) {
  if (notes.length < 3) return null;
  const sorted = [...notes].sort((a, b) => a - b);
  const root = sorted[0] % 12;
  const intervals = sorted.map(n => (n%12 - root + 12) % 12).sort((a, b) => a - b);
  return { root, name: NOTE_NAMES[root], type: CHORD_MAP[intervals.join(',')] || 'chord', notes: sorted };
}

function tryDetectChord() {
  const notes = [...heldNotes.keys()];
  if (notes.length >= 3) {
    const chord = detectChord(notes);
    if (chord) {
      const avg = chord.notes.map(n => heldNotes.get(n) || 80).reduce((a,b) => a+b, 0) / chord.notes.length;
      chordEl.textContent = `${chord.name} ${chord.type}`;
      chordEl.classList.add('visible');
      setTimeout(() => chordEl.classList.remove('visible'), 1500);
      addBuilding(chord, avg);
    }
  }
}

function updatePianoUI() {
  pianoKeyEls.forEach((el, note) => el.classList.toggle('active', heldNotes.has(note)));
}

function resetCity() {
  buildings.forEach(b => scene.remove(b));
  buildings.length = 0;
  spawning.length = 0;
  grid.clear();
  // Reset roads
  roadCells.clear();
  roadCount = 0; roadMesh.count = 0; roadMesh.instanceMatrix.needsUpdate = true;
  // Reset lamps
  lampCount = 0; poleMesh.count = 0; headMesh.count = 0;
  poleMesh.instanceMatrix.needsUpdate = true;
  headMesh.instanceMatrix.needsUpdate = true;
  // Stop road growth
  if (roadInterval) { clearInterval(roadInterval); roadInterval = null; }
  countEl.textContent = '0';
  algoEl.textContent = '—'; algoEl.className = 'dim';
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') { resetCity(); return; }
  const k = e.key.toLowerCase();
  if (kbHeldKeys.has(k)) return;
  const note = KEY_TO_NOTE[k];
  if (note == null) return;
  e.preventDefault();
  kbHeldKeys.add(k);
  heldNotes.set(note, 100);
  updatePianoUI();
  clearTimeout(chordTimeout);
  chordTimeout = setTimeout(tryDetectChord, 50);
});

document.addEventListener('keyup', (e) => {
  const k = e.key.toLowerCase();
  kbHeldKeys.delete(k);
  const note = KEY_TO_NOTE[k];
  if (note == null) return;
  e.preventDefault();
  heldNotes.delete(note);
  updatePianoUI();
});

function onMIDIMessage(e) {
  const [status, note, velocity] = e.data;
  const cmd = status & 0xf0;
  if (cmd === 0x90 && velocity > 0) {
    heldNotes.set(note, velocity); updatePianoUI();
    clearTimeout(chordTimeout);
    chordTimeout = setTimeout(tryDetectChord, 40);
  } else if (cmd === 0x80 || (cmd === 0x90 && velocity === 0)) {
    heldNotes.delete(note); updatePianoUI();
  }
}

async function initMIDI() {
  try {
    const access = await navigator.requestMIDIAccess();
    const inputs = [...access.inputs.values()];
    if (inputs.length === 0) { statusEl.textContent = 'Keyboard ready. No MIDI devices found.'; return; }
    inputs.forEach(i => { i.onmidimessage = onMIDIMessage; });
    statusEl.textContent = `Keyboard + MIDI: ${inputs.map(i => i.name).join(', ')}`;
    access.onstatechange = () => {
      const cur = [...access.inputs.values()];
      cur.forEach(i => { i.onmidimessage = onMIDIMessage; });
      statusEl.textContent = cur.length > 0
        ? `Keyboard + MIDI: ${cur.map(i => i.name).join(', ')}`
        : 'Keyboard ready. MIDI disconnected.';
    };
  } catch { statusEl.textContent = 'Keyboard ready. MIDI not available.'; }
}

// ===================== PIANO UI =====================
function buildPianoUI() {
  pianoEl.innerHTML = '';
  PIANO_LAYOUT.forEach(pk => {
    if (!pk.b) {
      const wr = document.createElement('div'); wr.className = 'pw';
      const el = document.createElement('div'); el.className = 'pk w'; el.textContent = pk.k;
      wr.appendChild(el); pianoKeyEls.set(pk.n, el);
      const nb = PIANO_LAYOUT.find(p => p.n === pk.n + 1 && p.b);
      if (nb) {
        const bel = document.createElement('div'); bel.className = 'pk b'; bel.textContent = nb.k;
        bel.style.left = 'auto'; bel.style.right = '-11px';
        wr.appendChild(bel); pianoKeyEls.set(nb.n, bel);
      }
      pianoEl.appendChild(wr);
    }
  });
}

// ===================== ANIMATION =====================
function easeOutBack(t) {
  const c1 = 1.70158, c3 = c1 + 1;
  return 1 + c3 * Math.pow(t-1, 3) + c1 * Math.pow(t-1, 2);
}

function animate() {
  requestAnimationFrame(animate);
  for (let i = spawning.length-1; i >= 0; i--) {
    const s = spawning[i];
    s.progress = Math.min(1, s.progress + 0.02);
    s.group.scale.y = easeOutBack(s.progress);
    if (s.progress >= 1) spawning.splice(i, 1);
  }
  renderer.render(scene, camera);
}

// ===================== INIT =====================
buildPianoUI();
animate();
initMIDI();

</script>
