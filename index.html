<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MIDI City Generator</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; font-family: 'Courier New', monospace; color: #e0e0e0; }
  canvas { display: block; }
  #ui { position: fixed; top: 20px; left: 20px; z-index: 10; pointer-events: none; }
  #status {
    background: rgba(0,0,0,0.7); padding: 10px 16px; border-radius: 8px;
    font-size: 13px; border: 1px solid rgba(100,255,150,0.3); backdrop-filter: blur(10px);
  }
  #chord-display {
    margin-top: 10px; background: rgba(0,0,0,0.7); padding: 10px 16px;
    border-radius: 8px; font-size: 20px; border: 1px solid rgba(255,255,255,0.1);
    backdrop-filter: blur(10px); opacity: 0; transition: opacity 0.3s;
  }
  #chord-display.visible { opacity: 1; }
  #info {
    position: fixed; top: 20px; right: 20px; background: rgba(0,0,0,0.7);
    padding: 10px 16px; border-radius: 8px; font-size: 13px;
    border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px); z-index: 10;
    text-align: right; line-height: 1.6;
  }
  #piano {
    position: fixed; bottom: 60px; left: 50%; transform: translateX(-50%);
    display: flex; z-index: 10; pointer-events: none;
  }
  .pw { position: relative; width: 32px; height: 90px; }
  .pk {
    position: absolute; bottom: 0; border-radius: 0 0 3px 3px;
    display: flex; align-items: flex-end; justify-content: center;
    padding-bottom: 5px; font-size: 9px; font-family: 'Courier New', monospace;
    transition: background 0.08s;
  }
  .pk.w {
    width: 30px; height: 90px; background: rgba(220,220,230,0.12);
    border: 1px solid rgba(255,255,255,0.08); color: rgba(255,255,255,0.3); z-index: 1;
  }
  .pk.b {
    width: 22px; height: 55px; background: rgba(30,30,50,0.7);
    border: 1px solid rgba(255,255,255,0.06); color: rgba(255,255,255,0.25);
    z-index: 2; right: -11px; top: 0;
  }
  .pk.active { background: rgba(126,184,255,0.5); box-shadow: 0 0 12px rgba(126,184,255,0.4); color: #fff; }
  .pk.b.active { background: rgba(126,184,255,0.6); }
  #help {
    position: fixed; bottom: 14px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,0.6); padding: 8px 16px; border-radius: 8px;
    font-size: 11px; border: 1px solid rgba(255,255,255,0.08);
    backdrop-filter: blur(10px); z-index: 10; color: #555; text-align: center;
    white-space: nowrap;
  }
  .dim { color: #555; }
  .algo-dla { color: #66ddee; }
  .algo-eden { color: #66ee88; }
  .algo-sprawl { color: #eebb66; }
</style>
</head>
<body>
<div id="ui">
  <div id="status">Keyboard ready. MIDI: scanning...</div>
  <div id="chord-display"></div>
</div>
<div id="info">
  <span class="dim">Buildings:</span> <span id="count">0</span><br>
  <span class="dim">Algorithm:</span> <span id="algo-name">—</span>
</div>
<div id="piano"></div>
<div id="help">Hold 3+ keys for a chord &nbsp;|&nbsp; A S D F G H J = white &nbsp;|&nbsp; W E T Y U = black &nbsp;|&nbsp; Esc = reset</div>

<script type="importmap">
{ "imports": {
    "three": "https://unpkg.com/three@0.162.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.162.0/examples/jsm/"
} }
</script>

<script type="module">
import * as THREE from 'three';

// ===================== CONSTANTS =====================
const NOTE_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];

const KEY_TO_NOTE = {
  'a':60,'w':61,'s':62,'e':63,'d':64,'f':65,'t':66,
  'g':67,'y':68,'h':69,'u':70,'j':71,'k':72,'o':73,
  'l':74,'p':75,';':76,"'":77,']':78,
};

const PIANO_LAYOUT = [
  {n:60,k:'A',b:false},{n:61,k:'W',b:true},{n:62,k:'S',b:false},{n:63,k:'E',b:true},
  {n:64,k:'D',b:false},{n:65,k:'F',b:false},{n:66,k:'T',b:true},{n:67,k:'G',b:false},
  {n:68,k:'Y',b:true},{n:69,k:'H',b:false},{n:70,k:'U',b:true},{n:71,k:'J',b:false},
  {n:72,k:'K',b:false},{n:73,k:'O',b:true},{n:74,k:'L',b:false},{n:75,k:'P',b:true},
  {n:76,k:';',b:false},{n:77,k:"'",b:false},{n:78,k:']',b:true},
];

const CHORD_MAP = {
  '0,3,7':'min','0,4,7':'maj','0,3,6':'dim','0,4,8':'aug',
  '0,3,7,10':'min7','0,4,7,10':'dom7','0,4,7,11':'maj7',
  '0,3,6,9':'dim7','0,3,7,11':'minMaj7','0,2,7':'sus2',
  '0,5,7':'sus4','0,4,7,10,14':'dom9','0,4,7,11,14':'maj9',
  '0,3,7,10,14':'min9','0,7':'power','0,4,7,14':'add9','0,3,7,14':'minadd9',
};

// ===================== DOM =====================
const statusEl = document.getElementById('status');
const chordEl = document.getElementById('chord-display');
const countEl = document.getElementById('count');
const algoEl = document.getElementById('algo-name');
const pianoEl = document.getElementById('piano');

// ===================== THREE.JS SCENE =====================
let W = window.innerWidth, H = window.innerHeight;

const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
renderer.setSize(W, H);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.3;
document.body.prepend(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a28);
scene.fog = new THREE.Fog(0x0a0a28, 150, 600);

// Fixed overhead camera — never moves
const camera = new THREE.PerspectiveCamera(40, W / H, 0.1, 1200);
camera.position.set(0, 280, 200);
camera.lookAt(0, 0, 0);

// --- Lights (brighter, no per-building PointLights) ---
scene.add(new THREE.AmbientLight(0x2a2a55, 1.8));
scene.add(new THREE.HemisphereLight(0x223355, 0x111118, 1.0));

const moonDir = new THREE.DirectionalLight(0x8899cc, 0.8);
moonDir.position.set(60, 80, -40);
scene.add(moonDir);

const fillLight = new THREE.DirectionalLight(0x443355, 0.4);
fillLight.position.set(-40, 60, 30);
scene.add(fillLight);

// Moon
const moonMesh = new THREE.Mesh(
  new THREE.SphereGeometry(4, 32, 32),
  new THREE.MeshBasicMaterial({ color: 0xfffff0 })
);
moonMesh.position.set(80, 90, -150);
scene.add(moonMesh);

// Stars
const starCount = 800;
const starPos = new Float32Array(starCount * 3);
for (let i = 0; i < starCount; i++) {
  starPos[i*3] = (Math.random()-0.5)*500;
  starPos[i*3+1] = Math.random()*140+30;
  starPos[i*3+2] = (Math.random()-0.5)*500;
}
const starGeo = new THREE.BufferGeometry();
starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({
  color: 0xffffff, size: 0.4, transparent: true, opacity: 0.7
})));

// Ground
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(800, 800),
  new THREE.MeshStandardMaterial({ color: 0x0e0e1e, roughness: 0.92, metalness: 0.05 })
);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -0.02;
scene.add(ground);

window.addEventListener('resize', () => {
  W = window.innerWidth; H = window.innerHeight;
  camera.aspect = W / H;
  camera.updateProjectionMatrix();
  renderer.setSize(W, H);
});

// ===================== GRID STATE =====================
const GRID_SIZE = 80;
const CELL_SIZE = 9;
const HALF_GRID = Math.floor(GRID_SIZE / 2);
const DIRS = [[0,1],[0,-1],[1,0],[-1,0]];
const grid = new Set();
const buildings = [];
const spawning = [];

function gridToWorld(gx, gz) {
  return { x: (gx - HALF_GRID) * CELL_SIZE, z: (gz - HALF_GRID) * CELL_SIZE };
}
function inBounds(x, z) { return x >= 0 && x < GRID_SIZE && z >= 0 && z < GRID_SIZE; }
function key(x, z) { return `${x},${z}`; }

// ===================== ROADS (InstancedMesh — 1 draw call) =====================
const ROAD_MAX = 3000;
const roadGeo = new THREE.PlaneGeometry(CELL_SIZE * 0.92, CELL_SIZE * 0.92);
roadGeo.rotateX(-Math.PI / 2);
const roadMat = new THREE.MeshStandardMaterial({
  color: 0x1c1c32, roughness: 0.75, metalness: 0.1,
  emissive: 0x0c0c18, emissiveIntensity: 0.3,
});
const roadMesh = new THREE.InstancedMesh(roadGeo, roadMat, ROAD_MAX);
roadMesh.count = 0;
roadMesh.position.y = 0.01;
scene.add(roadMesh);

const roadCells = new Set();
let roadCount = 0;
const dummy = new THREE.Object3D();

// ===================== STREETLAMPS (InstancedMesh — 2 draw calls) =====================
const LAMP_MAX = 800;
const poleGeo = new THREE.CylinderGeometry(0.08, 0.1, 3.5, 5);
const poleMesh = new THREE.InstancedMesh(poleGeo,
  new THREE.MeshStandardMaterial({ color: 0x445566, roughness: 0.5, metalness: 0.5 }), LAMP_MAX);
poleMesh.count = 0;
scene.add(poleMesh);

const headGeo = new THREE.SphereGeometry(0.22, 6, 6);
const headMesh = new THREE.InstancedMesh(headGeo,
  new THREE.MeshBasicMaterial({ color: 0xffeeaa }), LAMP_MAX);
headMesh.count = 0;
scene.add(headMesh);

let lampCount = 0;

function addStreetlamp(wx, wz) {
  if (lampCount >= LAMP_MAX) return;
  const offX = (Math.random() - 0.5) * CELL_SIZE * 0.6;
  const offZ = (Math.random() - 0.5) * CELL_SIZE * 0.6;
  dummy.position.set(wx + offX, 1.75, wz + offZ);
  dummy.updateMatrix();
  poleMesh.setMatrixAt(lampCount, dummy.matrix);
  dummy.position.y = 3.6;
  dummy.updateMatrix();
  headMesh.setMatrixAt(lampCount, dummy.matrix);
  lampCount++;
  poleMesh.count = lampCount;
  headMesh.count = lampCount;
  poleMesh.instanceMatrix.needsUpdate = true;
  headMesh.instanceMatrix.needsUpdate = true;
}

// ===================== CONNECTORS (InstancedMesh pools) =====================
const CONN_MAX = 600;

const treeCanopyGeo = new THREE.ConeGeometry(0.8, 2.2, 6);
const treeCanopyMat = new THREE.MeshStandardMaterial({
  color: 0x2a5a2a, roughness: 0.9, metalness: 0.05,
  emissive: 0x0a1a0a, emissiveIntensity: 0.2,
});
const treeMesh = new THREE.InstancedMesh(treeCanopyGeo, treeCanopyMat, CONN_MAX);
treeMesh.count = 0;
scene.add(treeMesh);

const trunkGeo = new THREE.CylinderGeometry(0.1, 0.15, 1.2, 5);
const trunkMat = new THREE.MeshStandardMaterial({ color: 0x4a3a2a, roughness: 0.9 });
const trunkMesh = new THREE.InstancedMesh(trunkGeo, trunkMat, CONN_MAX);
trunkMesh.count = 0;
scene.add(trunkMesh);

const carGeo = new THREE.BoxGeometry(1.2, 0.6, 2.2);
const carMat = new THREE.MeshStandardMaterial({ color: 0x334455, roughness: 0.5, metalness: 0.4 });
const carMesh = new THREE.InstancedMesh(carGeo, carMat, CONN_MAX);
carMesh.count = 0;
scene.add(carMesh);

const benchGeo = new THREE.BoxGeometry(1.5, 0.25, 0.4);
const benchMat = new THREE.MeshStandardMaterial({ color: 0x5a4a3a, roughness: 0.8 });
const benchMesh = new THREE.InstancedMesh(benchGeo, benchMat, CONN_MAX);
benchMesh.count = 0;
scene.add(benchMesh);

let treeCount = 0, carCount = 0, benchCount = 0;

function addTree(wx, wz) {
  if (treeCount >= CONN_MAX) return;
  const s = 0.7 + Math.random() * 0.6;
  dummy.position.set(wx, 0.6 * s, wz);
  dummy.scale.set(s, s, s);
  dummy.updateMatrix();
  trunkMesh.setMatrixAt(treeCount, dummy.matrix);
  dummy.position.y = 1.8 * s;
  dummy.updateMatrix();
  treeMesh.setMatrixAt(treeCount, dummy.matrix);
  treeCount++;
  treeMesh.count = treeCount;
  trunkMesh.count = treeCount;
  treeMesh.instanceMatrix.needsUpdate = true;
  trunkMesh.instanceMatrix.needsUpdate = true;
  dummy.scale.set(1, 1, 1);
}

function addCar(wx, wz, angle) {
  if (carCount >= CONN_MAX) return;
  dummy.position.set(wx, 0.3, wz);
  dummy.rotation.set(0, angle, 0);
  dummy.updateMatrix();
  carMesh.setMatrixAt(carCount, dummy.matrix);
  carCount++;
  carMesh.count = carCount;
  carMesh.instanceMatrix.needsUpdate = true;
  dummy.rotation.set(0, 0, 0);
}

function addBench(wx, wz, angle) {
  if (benchCount >= CONN_MAX) return;
  dummy.position.set(wx, 0.13, wz);
  dummy.rotation.set(0, angle, 0);
  dummy.updateMatrix();
  benchMesh.setMatrixAt(benchCount, dummy.matrix);
  benchCount++;
  benchMesh.count = benchCount;
  benchMesh.instanceMatrix.needsUpdate = true;
  dummy.rotation.set(0, 0, 0);
}

function spawnConnectors(curr, rng) {
  if (buildings.length < 2) return;
  const prev = buildings[buildings.length - 2];
  const prevW = gridToWorld(prev.gx, prev.gz);
  const currW = gridToWorld(curr.gx, curr.gz);
  const mx = (prevW.x + currW.x) / 2;
  const mz = (prevW.z + currW.z) / 2;

  const sameRoot = prev.chord.root === curr.chord.root;
  const sameType = prev.chord.type === curr.chord.type;
  const dist = Math.abs(prev.gx - curr.gx) + Math.abs(prev.gz - curr.gz);

  if (sameRoot) {
    // Shared courtyard — trees + bench
    for (let i = 0; i < 2 + Math.floor(rng() * 3); i++) {
      addTree(mx + (rng() - 0.5) * CELL_SIZE * 0.8, mz + (rng() - 0.5) * CELL_SIZE * 0.8);
    }
    addBench(mx + (rng() - 0.5) * 2, mz + (rng() - 0.5) * 2, rng() * Math.PI);
  } else if (sameType) {
    // Walkway — trees in a line
    const steps = Math.max(2, Math.floor(dist));
    for (let i = 0; i < steps; i++) {
      const t = (i + 0.5) / steps;
      addTree(
        prevW.x + (currW.x - prevW.x) * t + (rng() - 0.5) * 2,
        prevW.z + (currW.z - prevW.z) * t + (rng() - 0.5) * 2
      );
    }
  } else {
    // Street elements — cars
    const angle = Math.atan2(currW.z - prevW.z, currW.x - prevW.x);
    addCar(mx + (rng() - 0.5) * 3, mz + (rng() - 0.5) * 3, angle + (rng() - 0.5) * 0.3);
    if (rng() < 0.5) {
      addCar(mx + (rng() - 0.5) * 5, mz + (rng() - 0.5) * 5, angle + Math.PI + (rng() - 0.5) * 0.3);
    }
  }

  // Adjacent tall buildings get a bridge
  if (dist <= 2 && prev.velocity > 60 && curr.velocity > 60) {
    const prevFloors = Math.round(3 + (prev.velocity / 127) * 15);
    const currFloors = Math.round(3 + (curr.velocity / 127) * 15);
    const bridgeH = 0.4 + Math.min(prevFloors, currFloors) * FLOOR_H * 0.4;
    const dx = currW.x - prevW.x, dz = currW.z - prevW.z;
    const length = Math.sqrt(dx * dx + dz * dz);
    const bridge = new THREE.Mesh(
      new THREE.BoxGeometry(length, 0.3, 0.8),
      solidMat(0x3a3a4a, 0.7, 0.3)
    );
    bridge.position.set(mx, bridgeH, mz);
    bridge.rotation.y = Math.atan2(dz, dx);
    bridge.userData.isConnector = true;
    scene.add(bridge);
  }
}

function addRoad(gx, gz) {
  if (!inBounds(gx, gz) || grid.has(key(gx, gz)) || roadCells.has(key(gx, gz))) return false;
  if (roadCount >= ROAD_MAX) return false;
  roadCells.add(key(gx, gz));
  const w = gridToWorld(gx, gz);
  dummy.position.set(w.x, 0, w.z);
  dummy.updateMatrix();
  roadMesh.setMatrixAt(roadCount, dummy.matrix);
  roadCount++;
  roadMesh.count = roadCount;
  roadMesh.instanceMatrix.needsUpdate = true;
  // Streetlamp every 3rd road tile
  if (roadCount % 3 === 0) addStreetlamp(w.x, w.z);
  return true;
}

// --- Road generation: connect buildings ---
function generateRoadsForBuilding(gx, gz, rng) {
  // Scan each cardinal direction for a nearby building, lay road between
  for (const [dx, dz] of DIRS) {
    for (let dist = 1; dist <= 8; dist++) {
      const nx = gx + dx * dist, nz = gz + dz * dist;
      if (!inBounds(nx, nz)) break;
      if (grid.has(key(nx, nz))) {
        // Found a building — fill road cells between
        for (let d = 1; d < dist; d++) addRoad(gx + dx * d, gz + dz * d);
        break;
      }
    }
  }
  // 40% chance: random tendril 1-3 cells
  if (rng() < 0.4) {
    const [dx, dz] = DIRS[Math.floor(rng() * 4)];
    const len = 1 + Math.floor(rng() * 3);
    for (let d = 1; d <= len; d++) addRoad(gx + dx * d, gz + dz * d);
  }
}

// --- Periodic road growth (every 1.5s) ---
let roadInterval = null;
function startRoadGrowth() {
  if (roadInterval) return;
  roadInterval = setInterval(() => {
    if (buildings.length === 0 || roadCount >= ROAD_MAX) return;
    // Pick random road or building cell as start
    const pool = [...roadCells, ...grid];
    if (pool.length === 0) return;
    const start = pool[Math.floor(Math.random() * pool.length)];
    const [sx, sz] = start.split(',').map(Number);
    let cx = sx, cz = sz;
    let [dx, dz] = DIRS[Math.floor(Math.random() * 4)];
    const len = 1 + Math.floor(Math.random() * 4);
    for (let i = 0; i < len; i++) {
      cx += dx; cz += dz;
      if (!addRoad(cx, cz)) break;
      // 20% chance to turn
      if (Math.random() < 0.2) [dx, dz] = DIRS[Math.floor(Math.random() * 4)];
    }
  }, 1500);
}

// ===================== PLACEMENT ALGORITHMS =====================
function placeDLA(rng) {
  const edges = [];
  for (let i = 0; i < GRID_SIZE; i++) {
    if (!grid.has(key(0,i))) edges.push([0,i]);
    if (!grid.has(key(GRID_SIZE-1,i))) edges.push([GRID_SIZE-1,i]);
    if (!grid.has(key(i,0))) edges.push([i,0]);
    if (!grid.has(key(i,GRID_SIZE-1))) edges.push([i,GRID_SIZE-1]);
  }
  if (edges.length === 0) return placeEden(rng);
  let [px, pz] = edges[Math.floor(rng() * edges.length)];
  for (let step = 0; step < 3000; step++) {
    const [dx, dz] = DIRS[Math.floor(rng() * 4)];
    const nx = px + dx, nz = pz + dz;
    if (!inBounds(nx, nz)) continue;
    if (grid.has(key(nx, nz))) {
      grid.add(key(px, pz));
      return { gx: px, gz: pz, algo: 'DLA' };
    }
    px = nx; pz = nz;
  }
  return placeEden(rng);
}

function placeEden(rng) {
  const seen = new Set();
  const frontier = [];
  for (const k of grid) {
    const [x, z] = k.split(',').map(Number);
    for (const [dx, dz] of DIRS) {
      const nx = x + dx, nz = z + dz, nk = key(nx, nz);
      if (inBounds(nx, nz) && !grid.has(nk) && !seen.has(nk)) {
        seen.add(nk);
        frontier.push({ gx: nx, gz: nz });
      }
    }
  }
  if (frontier.length === 0) return null;
  const pick = frontier[Math.floor(rng() * frontier.length)];
  grid.add(key(pick.gx, pick.gz));
  return { ...pick, algo: 'Eden' };
}

function placeSprawl(rng) {
  const fm = new Map();
  for (const k of grid) {
    const [x, z] = k.split(',').map(Number);
    for (const [dx, dz] of DIRS) {
      const nx = x + dx, nz = z + dz, nk = key(nx, nz);
      if (inBounds(nx, nz) && !grid.has(nk)) fm.set(nk, (fm.get(nk) || 0) + 1);
    }
  }
  if (fm.size === 0) return null;
  const entries = [...fm.entries()];
  const weights = entries.map(([, c]) => c * c);
  const total = weights.reduce((a, b) => a + b, 0);
  let r = rng() * total;
  for (let i = 0; i < entries.length; i++) {
    r -= weights[i];
    if (r <= 0) {
      const [gx, gz] = entries[i][0].split(',').map(Number);
      grid.add(key(gx, gz));
      return { gx, gz, algo: 'Sprawl' };
    }
  }
  const [gx, gz] = entries[entries.length-1][0].split(',').map(Number);
  grid.add(key(gx, gz));
  return { gx, gz, algo: 'Sprawl' };
}

function findPlacement(rng) {
  if (grid.size === 0) {
    grid.add(key(HALF_GRID, HALF_GRID));
    return { gx: HALF_GRID, gz: HALF_GRID, algo: 'Seed' };
  }
  const roll = rng();
  if (roll < 0.33) return placeDLA(rng);
  if (roll < 0.66) return placeEden(rng);
  return placeSprawl(rng);
}

// ===================== SEEDED RNG =====================
const seededRandom = (seed) => {
  let s = Math.abs(seed) || 1;
  return () => { s = (s * 16807) % 2147483647; return (s - 1) / 2147483646; };
};

// ===================== TEXTURES & MATERIALS =====================
function makeWindowTex(floors, cols, bodyHex, litProb, rng) {
  const sz = 256, c = document.createElement('canvas');
  c.width = sz; c.height = sz;
  const ctx = c.getContext('2d');
  ctx.fillStyle = bodyHex;
  ctx.fillRect(0, 0, sz, sz);
  const cw = sz / cols, ch = sz / floors;
  for (let r = 0; r < floors; r++) {
    for (let ci = 0; ci < cols; ci++) {
      const wx = ci*cw + cw*0.18, wy = r*ch + ch*0.12;
      if (rng() < litProb) {
        const t = rng();
        ctx.fillStyle = t > 0.6 ? '#ffdd88' : t > 0.3 ? '#ffeebb' : '#aaccee';
      } else {
        ctx.fillStyle = '#08080f';
      }
      ctx.fillRect(wx, wy, cw*0.64, ch*0.76);
    }
  }
  return new THREE.CanvasTexture(c);
}

function buildingMat(tex, style) {
  return new THREE.MeshStandardMaterial({
    map: tex, emissiveMap: tex,
    emissive: new THREE.Color(0xffffff),
    emissiveIntensity: 1.1,
    roughness: style.rough, metalness: style.met,
  });
}

function solidMat(color, rough = 0.7, met = 0.2) {
  return new THREE.MeshStandardMaterial({ color, roughness: rough, metalness: met });
}

function colorToHex(c) {
  return `rgb(${Math.floor(c.r*255)},${Math.floor(c.g*255)},${Math.floor(c.b*255)})`;
}

function zoneColor(palettes, root, rng) {
  const base = new THREE.Color(palettes[Math.floor(rng() * palettes.length)]);
  const hsl = {}; base.getHSL(hsl);
  return new THREE.Color().setHSL((hsl.h + root / 12 * 0.12) % 1, hsl.s, hsl.l);
}

// ===================== COMPOSITE BUILDING ASSEMBLY =====================
function assembleBuilding(p) {
  const g = new THREE.Group();
  const zone = p.zone;
  const rng = p.rng;
  const color = p.color;

  // Floor count from velocity, clamped to zone range
  const [minF, maxF] = zone.floorRange;
  const floorCount = Math.max(minF, Math.min(maxF, Math.round(minF + (p.velocity / 127) * (maxF - minF))));

  // Base footprint
  let footW = Math.min(CELL_FIT, 4 + p.noteCount * 0.8 + rng() * 2);
  let footD = Math.min(CELL_FIT, 4 + rng() * 2);

  // Context: blend color with previous building if same zone
  let blendColor = color;
  if (p.prevColor && rng() < 0.4) {
    blendColor = color.clone().lerp(p.prevColor, 0.25);
  }

  const baseMat = solidMat(blendColor.clone().multiplyScalar(0.6), 0.85, 0.15);

  // Base slab
  const base = new THREE.Mesh(new THREE.BoxGeometry(footW + 0.5, 0.4, footD + 0.5), baseMat);
  base.position.y = 0.2;
  g.add(base);

  // Commercial ground floor shop front
  if (zone.groundFloorShop && rng() < 0.7) {
    const shopMat = solidMat(new THREE.Color().setHSL(rng() * 0.1 + 0.08, 0.5, 0.35), 0.6, 0.2);
    for (const side of [-1, 1]) {
      const shop = new THREE.Mesh(PARTS.shopFront, shopMat);
      shop.position.set(0, 0.7, side * (footD / 2 + 0.06));
      shop.scale.set(footW * 0.8, 1, 1);
      g.add(shop);
    }
  }

  // Grow floors
  let curW = footW, curD = footD;
  const floorGeo = PARTS[zone.floorGeo];
  const intervals = p.intervals || [];
  const zoneDetails = zone.details;

  for (let f = 0; f < floorCount; f++) {
    const floorY = 0.4 + f * FLOOR_H;
    const heightRatio = f / floorCount;

    curW *= (1 - zone.taper);
    curD *= (1 - zone.taper);

    // Floor texture — color varies slightly per floor
    const cols = Math.max(2, Math.round(curW / 2));
    const tex = makeWindowTex(1, cols,
      colorToHex(blendColor.clone().multiplyScalar(0.35 + rng() * 0.2)),
      zone.litP, rng);
    const mat = buildingMat(tex, { rough: zone.rough, met: zone.met });

    const floor = new THREE.Mesh(floorGeo, mat);
    floor.scale.set(curW, 1, curD);
    floor.position.y = floorY + FLOOR_H / 2;
    g.add(floor);

    // Organic offset
    if (rng() < zone.organic * 0.3) {
      floor.position.x += (rng() - 0.5) * 0.5;
      floor.position.z += (rng() - 0.5) * 0.5;
    }

    // Mutations
    const mutateChance = zone.mutateBase + heightRatio * 0.15;
    if (rng() < mutateChance) {
      const roll = rng();
      if (roll < 0.35) {
        // Balcony / porch protrusion
        const partKey = rng() < 0.7 ? 'balcony' : 'porch';
        const mut = new THREE.Mesh(PARTS[partKey], baseMat);
        const side = rng() > 0.5 ? 1 : -1;
        if (rng() > 0.5) {
          mut.position.set(0, floorY + 0.15, side * (curD / 2 + 0.15));
          mut.scale.set(curW * 0.6, 1, 1);
        } else {
          mut.position.set(side * (curW / 2 + 0.15), floorY + 0.15, 0);
          mut.scale.set(1, 1, curD * 0.6);
        }
        g.add(mut);
      } else if (roll < 0.6) {
        curW *= 0.85; curD *= 0.85;
      } else if (roll < 0.8) {
        floor.scale.set(curW * 1.12, 1, curD * 1.12);
      } else {
        // Terrace — half-height wider section
        const terr = new THREE.Mesh(PARTS.terrace, baseMat);
        terr.position.y = floorY + FLOOR_H * 0.25;
        terr.scale.set(curW * 0.9, 1, curD * 0.9);
        g.add(terr);
      }
    }

    // Detail pass — zone details + interval details
    for (const detailKey of zoneDetails) {
      if (!PARTS[detailKey]) continue;
      if (rng() > 0.25) continue;

      const isVine = detailKey === 'vine';
      const isArchway = detailKey === 'archway';
      const detail = new THREE.Mesh(PARTS[detailKey],
        isVine ? solidMat(new THREE.Color().setHSL(0.28 + rng() * 0.08, 0.5, 0.2 + rng() * 0.1), 0.9, 0.05)
        : isArchway ? solidMat(blendColor.clone().multiplyScalar(0.8), 0.6, 0.3)
        : solidMat(blendColor.clone().multiplyScalar(0.45 + rng() * 0.2), 0.7, 0.3)
      );

      const face = rng();
      if (face < 0.25)      detail.position.set(curW/2 + 0.08, floorY + FLOOR_H*0.5, (rng()-0.5)*curD*0.6);
      else if (face < 0.5)  detail.position.set(-curW/2 - 0.08, floorY + FLOOR_H*0.5, (rng()-0.5)*curD*0.6);
      else if (face < 0.75) detail.position.set((rng()-0.5)*curW*0.6, floorY + FLOOR_H*0.5, curD/2 + 0.08);
      else                  detail.position.set((rng()-0.5)*curW*0.6, floorY + FLOOR_H*0.5, -curD/2 - 0.08);
      g.add(detail);
    }
  }

  // Cap
  const capY = 0.4 + floorCount * FLOOR_H;
  const capKey = zone.caps[Math.floor(rng() * zone.caps.length)];
  const isGarden = capKey === 'capGarden';
  const isOnion = capKey === 'capOnion';
  const capMesh = new THREE.Mesh(PARTS[capKey],
    isGarden ? solidMat(new THREE.Color().setHSL(0.3, 0.4, 0.25), 0.9, 0.05)
    : solidMat(blendColor.clone().multiplyScalar(0.7), 0.5, 0.3)
  );
  capMesh.scale.set(curW, isOnion ? 1.4 : 1, curD);
  capMesh.position.y = capY;
  if (capKey === 'capPitched') capMesh.rotation.y = Math.PI / 4;
  g.add(capMesh);

  // Religious: add minarets
  if (zone.hasMinaret && floorCount >= 4) {
    const minaretH = floorCount * FLOOR_H * 0.6;
    for (const sx of [-1, 1]) {
      const mn = new THREE.Mesh(PARTS.minaret,
        solidMat(blendColor.clone().multiplyScalar(0.9), 0.5, 0.3));
      mn.scale.y = minaretH / 6;
      mn.position.set(sx * (curW * 0.6 + 0.5), minaretH / 2, 0);
      g.add(mn);
      const cap2 = new THREE.Mesh(PARTS.minaretCap,
        solidMat(blendColor.clone().multiplyScalar(1.1), 0.4, 0.4));
      cap2.position.set(sx * (curW * 0.6 + 0.5), minaretH + 0.1, 0);
      g.add(cap2);
    }
  }

  // Rooftop details
  if (intervals.includes(10) || intervals.includes(11)) {
    const ant = new THREE.Mesh(PARTS.antenna, solidMat(0x666677, 0.5, 0.6));
    ant.position.set((rng()-0.5)*curW*0.4, capY+1.25, (rng()-0.5)*curD*0.4);
    g.add(ant);
  }
  if (intervals.includes(14)) {
    const tank = new THREE.Mesh(PARTS.waterTank, solidMat(0x556666, 0.6, 0.4));
    tank.position.set((rng()-0.5)*curW*0.3, capY+0.3, (rng()-0.5)*curD*0.3);
    g.add(tank);
  }
  // High-tech: solar panels on roof
  if (zone === ZONES.hightech && rng() < 0.6) {
    const panel = new THREE.Mesh(PARTS.solarPanel, solidMat(0x223355, 0.3, 0.7));
    panel.position.set((rng()-0.5)*curW*0.3, capY+0.15, (rng()-0.5)*curD*0.3);
    panel.rotation.x = -0.3;
    g.add(panel);
  }
  // Industrial: chimney stacks
  if (zone === ZONES.industrial) {
    const chimneyCount = 1 + Math.floor(rng() * 2);
    for (let ci = 0; ci < chimneyCount; ci++) {
      const ch = new THREE.Mesh(PARTS.chimney, solidMat(0x3a3a3a, 0.9, 0.05));
      ch.position.set((rng()-0.5)*curW*0.5, capY+1, (rng()-0.5)*curD*0.5);
      g.add(ch);
    }
  }

  return g;
}

// ===================== ADD BUILDING =====================
function addBuilding(chord, velocity) {
  const seed = chord.notes.reduce((a, b) => a * 31 + b, 7) + Date.now();
  const rng = seededRandom(seed);

  // Zone detection with context momentum
  let zoneName = getZone(chord.type);
  if (buildings.length > 0 && rng() < 0.5) {
    zoneName = buildings[buildings.length - 1].zoneName;
  }
  const zone = ZONES[zoneName];
  const color = zoneColor(zone.palettes, chord.root, rng);

  // Get previous building's color for blending
  const prevColor = buildings.length > 0 ? buildings[buildings.length - 1].color : null;

  const placement = findPlacement(rng);
  if (!placement) return;
  const { gx, gz, algo } = placement;
  const world = gridToWorld(gx, gz);

  const group = assembleBuilding({
    velocity, color, zone, rng,
    chordType: chord.type,
    noteCount: chord.notes.length,
    intervals: chord.intervals || [],
    root: chord.root,
    prevColor,
  });

  group.position.set(world.x, 0, world.z);
  group.rotation.y = rng() * Math.PI * 2;
  group.scale.y = 0.01;
  scene.add(group);
  spawning.push({ group, progress: 0 });
  buildings.push({ group, gx, gz, chord, velocity, zoneName, color });

  spawnConnectors(buildings[buildings.length - 1], rng);
  generateRoadsForBuilding(gx, gz, rng);
  startRoadGrowth();

  // Weather changes with chord
  setWeather(getWeather(chord.type));

  countEl.textContent = buildings.length;
  const algoClass = algo === 'DLA' ? 'algo-dla' : algo === 'Eden' ? 'algo-eden' : algo === 'Sprawl' ? 'algo-sprawl' : 'dim';
  algoEl.className = algoClass;
  algoEl.textContent = `${algo} · ${zoneName}`;
}

// ===================== INPUT =====================
const heldNotes = new Map();
let chordTimeout = null;
const kbHeldKeys = new Set();
const pianoKeyEls = new Map();

function detectChord(notes) {
  if (notes.length < 3) return null;
  const sorted = [...notes].sort((a, b) => a - b);
  const root = sorted[0] % 12;
  const intervals = sorted.map(n => (n%12 - root + 12) % 12).sort((a, b) => a - b);
  return { root, name: NOTE_NAMES[root], type: CHORD_MAP[intervals.join(',')] || 'chord', notes: sorted, intervals };
}

function tryDetectChord() {
  const notes = [...heldNotes.keys()];
  if (notes.length >= 3) {
    const chord = detectChord(notes);
    if (chord) {
      const avg = chord.notes.map(n => heldNotes.get(n) || 80).reduce((a,b) => a+b, 0) / chord.notes.length;
      chordEl.textContent = `${chord.name} ${chord.type}`;
      chordEl.classList.add('visible');
      setTimeout(() => chordEl.classList.remove('visible'), 1500);
      addBuilding(chord, avg);
    }
  }
}

function updatePianoUI() {
  pianoKeyEls.forEach((el, note) => el.classList.toggle('active', heldNotes.has(note)));
}

function resetCity() {
  buildings.forEach(b => scene.remove(b.group));
  buildings.length = 0;
  spawning.length = 0;
  grid.clear();
  // Reset roads
  roadCells.clear();
  roadCount = 0; roadMesh.count = 0; roadMesh.instanceMatrix.needsUpdate = true;
  // Reset lamps
  lampCount = 0; poleMesh.count = 0; headMesh.count = 0;
  poleMesh.instanceMatrix.needsUpdate = true;
  headMesh.instanceMatrix.needsUpdate = true;
  // Reset connectors
  treeCount = 0; treeMesh.count = 0; trunkMesh.count = 0;
  treeMesh.instanceMatrix.needsUpdate = true;
  trunkMesh.instanceMatrix.needsUpdate = true;
  carCount = 0; carMesh.count = 0;
  carMesh.instanceMatrix.needsUpdate = true;
  benchCount = 0; benchMesh.count = 0;
  benchMesh.instanceMatrix.needsUpdate = true;
  scene.children.filter(c => c.userData?.isConnector).forEach(c => scene.remove(c));
  // Stop road growth
  if (roadInterval) { clearInterval(roadInterval); roadInterval = null; }
  countEl.textContent = '0';
  algoEl.textContent = '—'; algoEl.className = 'dim';
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') { resetCity(); return; }
  const k = e.key.toLowerCase();
  if (kbHeldKeys.has(k)) return;
  const note = KEY_TO_NOTE[k];
  if (note == null) return;
  e.preventDefault();
  kbHeldKeys.add(k);
  heldNotes.set(note, 100);
  updatePianoUI();
  clearTimeout(chordTimeout);
  chordTimeout = setTimeout(tryDetectChord, 50);
});

document.addEventListener('keyup', (e) => {
  const k = e.key.toLowerCase();
  kbHeldKeys.delete(k);
  const note = KEY_TO_NOTE[k];
  if (note == null) return;
  e.preventDefault();
  heldNotes.delete(note);
  updatePianoUI();
});

function onMIDIMessage(e) {
  const [status, note, velocity] = e.data;
  const cmd = status & 0xf0;
  if (cmd === 0x90 && velocity > 0) {
    heldNotes.set(note, velocity); updatePianoUI();
    clearTimeout(chordTimeout);
    chordTimeout = setTimeout(tryDetectChord, 40);
  } else if (cmd === 0x80 || (cmd === 0x90 && velocity === 0)) {
    heldNotes.delete(note); updatePianoUI();
  }
}

async function initMIDI() {
  try {
    const access = await navigator.requestMIDIAccess();
    const inputs = [...access.inputs.values()];
    if (inputs.length === 0) { statusEl.textContent = 'Keyboard ready. No MIDI devices found.'; return; }
    inputs.forEach(i => { i.onmidimessage = onMIDIMessage; });
    statusEl.textContent = `Keyboard + MIDI: ${inputs.map(i => i.name).join(', ')}`;
    access.onstatechange = () => {
      const cur = [...access.inputs.values()];
      cur.forEach(i => { i.onmidimessage = onMIDIMessage; });
      statusEl.textContent = cur.length > 0
        ? `Keyboard + MIDI: ${cur.map(i => i.name).join(', ')}`
        : 'Keyboard ready. MIDI disconnected.';
    };
  } catch { statusEl.textContent = 'Keyboard ready. MIDI not available.'; }
}

  PIANO_LAYOUT.forEach(pk => {
    if (!pk.b) {
      const wr = document.createElement('div'); wr.className = 'pw';
      const el = document.createElement('div'); el.className = 'pk w'; el.textContent = pk.k;
      wr.appendChild(el); pianoKeyEls.set(pk.n, el);
      const nb = PIANO_LAYOUT.find(p => p.n === pk.n + 1 && p.b);
      if (nb) {
        const bel = document.createElement('div'); bel.className = 'pk b'; bel.textContent = nb.k;
        bel.style.left = 'auto'; bel.style.right = '-11px';
        wr.appendChild(bel); pianoKeyEls.set(nb.n, bel);
      }
      pianoEl.appendChild(wr);
    }
  });
}

// ===================== ANIMATION =====================
function easeOutBack(t) {
  const c1 = 1.70158, c3 = c1 + 1;
  return 1 + c3 * Math.pow(t-1, 3) + c1 * Math.pow(t-1, 2);
}

function animate() {
  requestAnimationFrame(animate);
  for (let i = spawning.length-1; i >= 0; i--) {
    const s = spawning[i];
    s.progress = Math.min(1, s.progress + 0.02);
    s.group.scale.y = easeOutBack(s.progress);
    if (s.progress >= 1) spawning.splice(i, 1);
  }
  // Weather: smooth background transition
  scene.background.lerp(targetBg, 0.02);
  // Rain animation
  if (rainMesh.visible) {
    const pos = rainGeo.attributes.position.array;
    for (let i = 0; i < rainCount; i++) {
      pos[i*3+1] -= rainSpeeds[i];
      if (pos[i*3+1] < 0) {
        pos[i*3+1] = 80 + Math.random() * 40;
        pos[i*3]   = (Math.random() - 0.5) * 300;
        pos[i*3+2] = (Math.random() - 0.5) * 300;
      }
    }
    rainGeo.attributes.position.needsUpdate = true;
  }
  renderer.render(scene, camera);
}

// ===================== INIT =====================
buildPianoUI();
animate();
initMIDI();

</script>
